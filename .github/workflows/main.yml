name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: '创建 Release'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release 标签 (例如: v1.0.0)'
        required: false
        type: string
      release_name:
        description: 'Release 名称'
        required: false
        type: string
      prerelease:
        description: '预发布版本'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        # 添加 qfluentwidgets 版本选择
        qfluentwidgets-version: [lite, full]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install UPX (for compressing executables)
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Cache build dependencies (platform specific path)
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '~\\AppData\\Local\\pip\\Cache' || '~/.cache/pip' }}
          key: ${{ runner.os }}-${{ matrix.qfluentwidgets-version }}-build-${{ hashFiles('**/requirements.txt', '**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.qfluentwidgets-version }}-build-
            ${{ runner.os }}-build-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            libgl1 \
            libtiff6 \
            libxcb-cursor0 \
            libxkbcommon-x11-0
        shell: bash

      - name: Install base dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: pwsh

      - name: Install base dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      # 新增：安装 qfluentwidgets
      - name: Install QFluentWidgets (Lite Version)
        if: matrix.qfluentwidgets-version == 'lite'
        run: |
          python -m pip install --upgrade --no-cache-dir PyQt-Fluent-Widgets
          echo "📦 已安装 QFluentWidgets 轻量版"

      - name: Install QFluentWidgets (Full Version)
        if: matrix.qfluentwidgets-version == 'full'
        run: |
          python -m pip install --upgrade --no-cache-dir "PyQt-Fluent-Widgets[full]"
          echo "📦 已安装 QFluentWidgets 完整版"

      - name: Verify QFluentWidgets installation
        run: |
          python -c "import qfluentwidgets; print('QFluentWidgets version:', qfluentwidgets.__version__)"
          python -c "print('Installation type: ${{ matrix.qfluentwidgets-version }}')"

      - name: Build application (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PYTHONIOENCODING="utf-8"
          $env:PYTHONUTF8="1"
          $env:QFLUENTWIDGETS_VERSION="${{ matrix.qfluentwidgets-version }}"
          chcp 65001
          python build.py
        shell: pwsh

      - name: Build application (Linux)
        if: runner.os == 'Linux'
        run: |
          export PYTHONIOENCODING="utf-8"
          export PYTHONUTF8=1
          export QFLUENTWIDGETS_VERSION="${{ matrix.qfluentwidgets-version }}"
          python3 build.py
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          # 修改artifact名称，包含版本信息
          name: debug-build-${{ matrix.os }}-${{ matrix.qfluentwidgets-version }}
          path: |
            dist/*.zip
          retention-days: 90

  # Release 任务
  release:
    needs: build
    if: github.event.inputs.create_release == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate inputs
        run: |
          if [[ -z "${{ github.event.inputs.release_tag }}" ]]; then
            echo "❌ 错误: 创建 Release 时必须提供标签"
            exit 1
          fi
          
          if [[ ! "${{ github.event.inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "❌ 错误: 标签格式不正确，请使用 vX.Y.Z 格式"
            exit 1
          fi
          
          if git tag --list | grep -q "^${{ github.event.inputs.release_tag }}$"; then
            echo "❌ 错误: 标签 ${{ github.event.inputs.release_tag }} 已存在"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog (before creating tag)
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "📝 生成首个版本的完整更新日志"
            git-cliff --unreleased --output RELEASE_NOTES.md
          else
            echo "📝 生成从 $PREVIOUS_TAG 到当前的更新日志"  
            git-cliff ${PREVIOUS_TAG}..HEAD --unreleased --output RELEASE_NOTES.md
          fi
          
          echo "📋 生成的 Release 说明："
          cat RELEASE_NOTES.md

      - name: Create tag
        run: |
          git tag ${{ github.event.inputs.release_tag }}
          git push origin ${{ github.event.inputs.release_tag }}

      - name: Update full CHANGELOG
        run: |
          git-cliff --output CHANGELOG.md

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # 重命名构建产物以便识别（包含 qfluentwidgets 版本信息）
          find ./artifacts -name "*.zip" -type f | while read file; do
            dir_name=$(basename $(dirname "$file"))
            file_name=$(basename "$file")
            
            # 从目录名提取操作系统信息
            if [[ "$dir_name" == *"windows"* ]]; then
              os_suffix="windows"
            elif [[ "$dir_name" == *"ubuntu"* ]]; then
              os_suffix="linux"
            elif [[ "$dir_name" == *"macos"* ]]; then
              os_suffix="macos"
            else
              os_suffix="unknown"
            fi
            
            # 提取 qfluentwidgets 版本信息
            if [[ "$dir_name" == *"lite"* ]]; then
              qfw_suffix="lite"
            elif [[ "$dir_name" == *"full"* ]]; then
              qfw_suffix="full"
            else
              qfw_suffix="unknown"
            fi
            
            # 为文件添加版本、平台和QFluentWidgets版本后缀
            version_tag="${{ github.event.inputs.release_tag }}"
            new_name="${file_name%.*}-${version_tag}-${os_suffix}-${qfw_suffix}.zip"
            
            cp "$file" "release-assets/$new_name"
            echo "📦 准备发布包: $new_name"
          done
          
          # 显示所有准备发布的文件
          echo "🎁 所有发布包:"
          ls -la release-assets/
          
          # 统计构建包数量
          echo "📊 构建统计:"
          echo "  总计: $(ls -1 release-assets/ | wc -l) 个构建包"
          echo "  轻量版: $(ls -1 release-assets/ | grep -c 'lite') 个"
          echo "  完整版: $(ls -1 release-assets/ | grep -c 'full') 个"
          echo "  Windows: $(ls -1 release-assets/ | grep -c 'windows') 个"
          echo "  Linux: $(ls -1 release-assets/ | grep -c 'linux') 个"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}
          body_path: RELEASE_NOTES.md
          draft: true
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG in repository
        run: |
          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            git add CHANGELOG.md
            git commit -m "docs: 更新 CHANGELOG.md for ${{ github.event.inputs.release_tag }}"
            git push origin main
            echo "✅ CHANGELOG.md 已更新并提交"
          else
            echo "ℹ️ CHANGELOG.md 无变化，跳过提交"
          fi

      - name: Release summary
        run: |
          echo "🎉 Release 创建成功!"
          echo "📋 详细信息:"
          echo "  标签: ${{ github.event.inputs.release_tag }}"
          echo "  名称: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}"
          echo "  状态: 草稿 (需要手动发布)"
          echo "  预发布: ${{ github.event.inputs.prerelease }}"
          echo "  构建包数量: $(ls -1 release-assets/ | wc -l)"
          echo "  - Windows (lite + full): $(ls -1 release-assets/ | grep -c 'windows')"
          echo "  - Linux (lite + full): $(ls -1 release-assets/ | grep -c 'linux')"
          echo "🔗 查看地址: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.release_tag }}"
